name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  # Candado: corre las pruebas de lógica de turnos ANTES de publicar.
  # Si alguna falla, el job "deploy" (needs: test) NO se ejecuta → no se
  # publica una versión con la lógica rota.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Pruebas de logica de turnos
        run: node turnos.test.js

  deploy:
    needs: test          # solo despliega si "test" pasó
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: vercel --yes --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
